<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live remote browser — demo</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fafafa;
        --card: #ffffff;
        --fg: #18181b;
        --muted: #71717a;
        --border: #e4e4e7;
        --accent: #4f46e5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #09090b;
          --card: #18181b;
          --fg: #f4f4f5;
          --muted: #a1a1aa;
          --border: #27272a;
          --accent: #818cf8;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--fg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 24px;
      }
      .frame {
        width: 100%;
        max-width: 520px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--card);
        padding: 28px;
        text-align: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px 10px;
        margin-bottom: 18px;
      }
      h1 {
        font-size: 17px;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        color: var(--muted);
        margin: 0 auto 20px;
        max-width: 38ch;
        line-height: 1.5;
      }
      .field {
        text-align: left;
        margin: 0 auto 12px;
        max-width: 320px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: transparent;
        color: var(--fg);
        font: inherit;
      }
      .robot {
        display: flex;
        align-items: center;
        gap: 10px;
        max-width: 320px;
        margin: 0 auto 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        text-align: left;
        font-size: 13px;
      }
      .robot input {
        width: 18px;
        height: 18px;
      }
      button {
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: var(--accent);
        border: 0;
        border-radius: 8px;
        padding: 9px 16px;
        cursor: pointer;
      }
      .note {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <span class="chip">read / write · demo session</span>
      <h1>Sign in to continue</h1>
      <p>
        This is a calm placeholder standing in for the embedded worker browser. No
        real session is opened.
      </p>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" value="alice@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" value="••••••••" />
      </div>
      <label class="robot"> <input type="checkbox" /> I'm not a robot </label>
      <button id="done" type="button">Simulate success</button>
      <p class="note">
        "Simulate success" posts <code>tessera-session-done</code> to the parent,
        driving the live stage to Verifying → Done.
      </p>
    </main>
    <script>
      // The demo never sees a real password; the button just exercises the
      // server-detected-success path so the whole stage is demoable on fixtures.
      document.getElementById('done').addEventListener('click', function () {
        window.parent.postMessage('tessera-session-done', '*')
      })
    </script>
  </body>
</html>
