name: ci

# Test on every push and PR; additionally build + push a multi-arch container image
# to GHCR on pushes to main and on version tags. Mirrors the (archived) spike CI.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    # Fail the build if private/PII patterns ever land in this (public-destined)
    # repo. Generic example data (example.com, alice/bob) is fine; real homelab
    # identities, secrets, or live tenant/app GUIDs are not. The maintainer
    # contact in SECURITY.md is the one allowed address.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for private identities / secrets
        # Single source of truth: the same script the pre-commit hook runs, so
        # the gate is enforced identically at commit time and in CI.
        run: bash scripts/check-pii.sh

  test:
    needs: hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore Tessera.slnx
      - name: Build
        run: dotnet build Tessera.slnx -c Release --no-restore
      - name: Test
        run: dotnet test Tessera.slnx -c Release --no-build --nologo
      - name: Smoke (CLI validate)
        run: |
          dotnet run --project src/Tessera.Cli -c Release --no-build -- \
            validate --config deploy/config/tessera.example.json \
                     --grants deploy/config/grants.example.json

  image:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Fast amd64-only on branch pushes; full multi-arch on version tags
          # (arm64 builds the .NET image under QEMU, which is slow — reserve it
          # for releases). The homelab node is amd64.
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
