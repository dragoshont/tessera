name: ci

# Test on every push and PR; additionally build + push a multi-arch container image
# to GHCR on pushes to main and on version tags. Mirrors the (archived) spike CI.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    # Fail the build if private/PII patterns ever land in this (public-destined)
    # repo. Generic example data (example.com, alice/bob) is fine; real homelab
    # identities, secrets, or live tenant/app GUIDs are not. The maintainer
    # contact in SECURITY.md is the one allowed address.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for private identities / secrets
        run: |
          # Real homelab identities, secrets, or live tenant/app GUIDs must not
          # land here. Generic example data is fine. Excludes: this workflow file,
          # SECURITY.md (maintainer contact), the documented PUBLIC Microsoft
          # consumer-tenant constant, and obvious placeholder GUIDs (1111…, 0000…).
          patterns='alice79|bob84|health-portal|account-[abc]-session|examplekv|hont\.ro|[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
          if git grep -nIE "$patterns" -- . ':!SECURITY.md' ':!.github/workflows/ci.yml' \
               | grep -vE '9188040d-6c67-4c5b-b112-36a304b66dad' \
               | grep -viE '\b([0-9a-f])\1{7}-' \
               | grep -vE '1111-1111-1111|2222-3333-4444'; then
            echo '::error::private identity / secret pattern found in the repo (see matches above). Genericize before committing.'
            exit 1
          fi
          echo 'hygiene OK — no private identities/secrets found.'

  test:
    needs: hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore Tessera.slnx
      - name: Build
        run: dotnet build Tessera.slnx -c Release --no-restore
      - name: Test
        run: dotnet test Tessera.slnx -c Release --no-build --nologo
      - name: Smoke (CLI validate)
        run: |
          dotnet run --project src/Tessera.Cli -c Release --no-build -- \
            validate --config deploy/config/tessera.example.json \
                     --grants deploy/config/grants.example.json

  image:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Fast amd64-only on branch pushes; full multi-arch on version tags
          # (arm64 builds the .NET image under QEMU, which is slow — reserve it
          # for releases). The homelab node is amd64.
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
