name: pages

# Publish the admin-portal SPA as a no-backend DEMO to GitHub Pages.
# It builds with VITE_TESSERA_DEMO=1 (the in-memory fixtures client — no broker,
# no secret, no network) under a '/tessera/' base path, and copies index.html to
# 404.html so client-side routing survives a deep-link/refresh on Pages.
#
# This publishes ONLY the design preview. The real broker still serves its own SPA
# at '/' in-cluster (unaffected — the base path is opt-in via VITE_BASE).

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (demo, /tessera/ base)
        env:
          VITE_TESSERA_DEMO: "1"
          VITE_BASE: "/tessera/"
        run: npm run build
      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html
      - name: Disable Jekyll (serve _-prefixed asset paths verbatim)
        run: touch dist/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
